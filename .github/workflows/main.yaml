name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    # kcov v42 need libopcodes-2.38-system.so, so we need to use ubuntu-22.04
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
      - name: Set up zig
        uses: mlugg/setup-zig@v2
        with:
          version: master
      - name: Run zig fmt
        run: zig fmt --check .
      - name: Install kcov
        run: |
          wget https://github.com/SimonKagstrom/kcov/releases/download/v42/kcov-amd64.tar.gz
          sudo tar xf kcov-amd64.tar.gz -C /
      - name: Build
        run: zig build
      - name: Run test with kcov
        run: |
          kcov --version
          zig build test -Dtest-coverage=true --summary all
      - name: Upload coverage
        uses: codecov/codecov-action@v6
        with:
          directory: ./kcov-output
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true
          fail_ci_if_error: true
